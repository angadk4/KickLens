name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest

    # T-210: a real Postgres so the DB-backed guarantees actually RUN in CI
    # (leakage suite recompute-parity, schema constraints, write-once ledger) — not skip.
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: kicklens
          POSTGRES_PASSWORD: kicklens
          POSTGRES_DB: kicklens_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kicklens -d kicklens_test"
          --health-interval 5s --health-timeout 3s --health-retries 10

    env:
      # points the integration + leakage suites at the CI Postgres
      DATABASE_URL: postgresql://kicklens:kicklens@localhost:5432/kicklens_test

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Sync (frozen lockfile)
        run: uv sync --frozen

      - name: Lint (ruff)
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Type-check (mypy)
        run: uv run mypy

      - name: Tests incl. leakage + schema + write-once (blocks merge if red)
        run: uv run pytest

      - name: Assert the never-cut suites executed (not silently no-op'd)
        # The failure mode to catch is the WHOLE suite silently skipping — e.g. an unset
        # DATABASE_URL makes every DB test skip and pytest still exits 0, a false green.
        # Individual data-gated skips are expected here: the recompute-parity checks need
        # the full historical load (absent in a fresh CI DB) and run in the sealed
        # environment. So: fail only if ZERO tests actually passed.
        run: |
          uv run pytest tests/test_leakage.py tests/test_schema_core.py \
            tests/test_schema_audit.py -rs | tee nevercut.log
          if ! grep -qE "[1-9][0-9]* passed" nevercut.log; then
            echo "::error::never-cut suites produced no passing tests — they did not execute"
            exit 1
          fi
          echo "never-cut suites executed against Postgres"

      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
